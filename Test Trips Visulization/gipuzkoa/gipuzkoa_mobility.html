<html>
<head>
<meta charset="UTF-8">
<title>Gipuzkoa — Movilidad</title>

<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#08101e; font-family:'Space Mono',monospace; color:#e0e8f4; overflow:hidden; height:100vh; }
#map { width:100vw; height:100vh; position:absolute; top:0; left:0; }
#deck-canvas { position:absolute; top:0; left:0; pointer-events:none; z-index:2; }

#loading {
  position:absolute; inset:0; background:#08101e;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; gap:16px;
}
#loading h2 { font-size:13px; color:#00c8ff; letter-spacing:3px; }
#progress-wrap { width:320px; height:2px; background:rgba(255,255,255,0.1); }
#progress-fill { height:100%; background:#00c8ff; transition:width 0.2s; width:0%; }
#loading-msg { font-size:10px; color:#4a5568; letter-spacing:2px; }

#header {
  position:absolute; top:20px; left:24px; z-index:10; pointer-events:none; display:none;
}
#header h1 { font-size:20px; color:#fff; letter-spacing:1px; }
#header p { font-size:9px; color:#4a5568; margin-top:3px; letter-spacing:2px; text-transform:uppercase; }

#legend {
  position:absolute; top:20px; right:20px; z-index:10; display:none;
  background:rgba(8,16,30,0.85); border:1px solid rgba(255,255,255,0.07);
  padding:12px 14px; font-size:10px;
}
.lrow { display:flex; align-items:center; gap:8px; margin-bottom:5px; color:#aab; }
.ldot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

#ui {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  z-index:10; width:min(560px, calc(100vw - 40px));
  background:rgba(8,16,30,0.9); border:1px solid rgba(0,200,255,0.15);
  padding:18px 22px; display:none;
}
#toprow { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
#clock { font-size:30px; font-weight:700; color:#00c8ff; letter-spacing:4px; }
#active-label { font-size:11px; color:#ff6b35; }
input[type=range] { width:100%; accent-color:#00c8ff; cursor:pointer; margin-bottom:6px; display:block; }
#ticks { display:flex; justify-content:space-between; font-size:9px; color:#3a4558; margin-bottom:12px; }
.btnrow { display:flex; gap:8px; align-items:center; }
button {
  background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.25);
  color:#00c8ff; font-family:'Space Mono',monospace; font-size:10px;
  padding:6px 14px; cursor:pointer; letter-spacing:1px;
}
button:hover { background:rgba(0,200,255,0.2); }
select {
  background:rgba(8,16,30,0.9); border:1px solid rgba(255,255,255,0.1);
  color:#667; font-family:'Space Mono',monospace; font-size:10px;
  padding:6px 10px; cursor:pointer; margin-left:auto;
}
</style>
</head>
<body>

<div id="map"></div>
<canvas id="deck-canvas"></canvas>

<div id="loading">
  <h2>CALCULANDO RUTAS REALES</h2>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <div id="loading-msg">Cargando mapa...</div>
</div>

<div id="header">
  <h1>Gipuzkoa — Movilidad</h1>
  <p>Rutas reales · Origen–Destino</p>
</div>
<div id="legend">

  <div class="lrow"><div class="ldot" style="background:#ff6b35"></div>Tipo B</div>
  <div class="lrow"><div class="ldot" style="background:#78ffb4"></div>Tipo C</div>
</div>
<div id="ui">
  <div id="toprow">
    <div id="clock">07:00</div>
    <div id="active-label">0 viajes en ruta</div>
  </div>
  <input type="range" id="slider" min="25200" max="39600" value="25200" step="30">
  <div id="ticks"><span>07:00</span><span>08:00</span><span>09:00</span><span>10:00</span><span>11:00</span></div>
  <div class="btnrow">
    <button id="btnPlay" onclick="togglePlay()">⏸ PAUSA</button>
    <button onclick="resetAnim()">↺ RESET</button>
    <select onchange="speed=+this.value">
      <option value="30">1×</option>
      <option value="60" selected>2×</option>
      <option value="120">4×</option>
      <option value="300">10×</option>
    </select>
  </div>
</div>

const MIN_T = 25200, MAX_T = 39600, TRAIL = 900;
const COLORS = [[0,200,255],[255,107,53],[120,255,180]];
let tripsData = [], t = MIN_T, playing = false, speed = 60, last = null, deckgl = null;

// Verify libraries loaded
console.log('maplibregl:', typeof maplibregl);
console.log('deck:', typeof deck);
console.log('deck.DeckGL:', typeof deck?.DeckGL);
console.log('deck.TripsLayer:', typeof deck?.TripsLayer);

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-nolabels-gl-style/style.json',
  center: [-2.18, 43.18],
  zoom: 9.2, pitch: 45, bearing: -8,
  antialias: true
});

map.on('load', () => {
  console.log('MapLibre loaded ✓');
  const mc = map.getCanvas();
  const dc = document.getElementById('deck-canvas');
  dc.width = mc.width;
  dc.height = mc.height;
  dc.style.width = mc.offsetWidth + 'px';
  dc.style.height = mc.offsetHeight + 'px';

  deckgl = new deck.DeckGL({
    canvas: 'deck-canvas',
    initialViewState: { longitude:-2.18, latitude:43.18, zoom:9.2, pitch:45, bearing:-8 },
    controller: true,
    onViewStateChange: ({viewState}) => {
      map.jumpTo({
        center: [viewState.longitude, viewState.latitude],
        zoom: viewState.zoom,
        bearing: viewState.bearing,
        pitch: viewState.pitch
      });
    },
    layers: []
  });
  console.log('DeckGL created ✓');

  map.on('resize', () => {
    const mc = map.getCanvas();
    dc.width = mc.width;
    dc.height = mc.height;
  });

  fetchAllRoutes();
});

map.on('error', e => {
  console.error('Map error:', e);
  document.getElementById('loading-msg').textContent = 'Map error: ' + (e.error?.message || JSON.stringify(e));
});

async function fetchRoute(od) {
  const url = `https://router.project-osrm.org/route/v1/driving/${od.origin[0]},${od.origin[1]};${od.dest[0]},${od.dest[1]}?overview=full&geometries=geojson`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 'Ok' && data.routes?.[0]) {
      const coords = data.routes[0].geometry.coordinates;
      const n = coords.length;
      const timestamps = coords.map((_, i) => od.t0 + (i/(n-1)) * (od.t1 - od.t0));
      return { vendor: od.vendor, path: coords, timestamps };
    }
  } catch(e) { console.warn('OSRM failed:', e.message); }
  const mid = [(od.origin[0]+od.dest[0])/2, (od.origin[1]+od.dest[1])/2];
  return { vendor: od.vendor, path: [od.origin, mid, od.dest], timestamps: [od.t0, (od.t0+od.t1)/2, od.t1] };
}

async function fetchAllRoutes() {
  const total = OD_DATA.length;
  const BATCH = 8;
  let done = 0;
  for (let i = 0; i < total; i += BATCH) {
    const batch = OD_DATA.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(od => fetchRoute(od)));
    tripsData.push(...results.filter(Boolean));
    done += batch.length;
    document.getElementById('progress-fill').style.width = Math.round(done/total*100) + '%';
    document.getElementById('loading-msg').textContent = `Calculando rutas... ${done} / ${total}`;
    await new Promise(r => setTimeout(r, 60));
  }
  console.log('All routes fetched:', tripsData.length);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  document.getElementById('header').style.display = 'block';
  document.getElementById('legend').style.display = 'block';
  playing = true;
  requestAnimationFrame(loop);
}

function loop(now) {
  if (playing) {
    if (last !== null) t += (now - last) / 1000 * speed;
    last = now;
    if (t > MAX_T) t = MIN_T;
  } else { last = null; }
  if (deckgl) {
    deckgl.setProps({ layers: [new deck.TripsLayer({
      id: 'trips', data: tripsData,
      getPath: d => d.path, getTimestamps: d => d.timestamps,
      getColor: d => COLORS[d.vendor],
      currentTime: t, trailLength: TRAIL,
      widthMinPixels: 2, rounded: true, opacity: 1.0, shadowEnabled: false
    })] });
  }
  updateUI();
  requestAnimationFrame(loop);
}

function updateUI() {
  const h = Math.floor(t/3600);
  const m = String(Math.floor((t%3600)/60)).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
  document.getElementById('slider').value = t;
  const active = tripsData.filter(d => {
    const t0 = d.timestamps[0], t1 = d.timestamps[d.timestamps.length-1];
    return t >= t0 - TRAIL && t <= t1;
  }).length;
  document.getElementById('active-label').textContent = active + ' viajes en ruta';
}

function togglePlay() {
  playing = !playing; last = null;
  document.getElementById('btnPlay').textContent = playing ? '⏸ PAUSA' : '▶ PLAY';
}
function resetAnim() { t = MIN_T; }
document.getElementById('slider').addEventListener('input', e => {
  t = +e.target.value; playing = false; last = null;
  document.getElementById('btnPlay').textContent = '▶ PLAY';
});
</script>
